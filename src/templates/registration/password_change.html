{% extends "base.html" %}

{% block title %}Change Password - {{ COMPANY_NAME }}{% endblock %}

{% block content %}
<div class="flex justify-between items-center pt-3 pb-2 mb-3 border-b border-gray-200">
    <h1 class="text-2xl font-semibold text-gray-900">Change Password</h1>
</div>

<div class="max-w-xl">
    <div class="bg-white rounded-lg shadow border border-gray-200">
        <div class="p-6">
            <form method="post">
                {% csrf_token %}

                {% if form.errors %}
                <div class="bg-red-50 border border-red-200 text-red-800 rounded-lg p-4 mb-4">
                    {% for field in form %}
                        {% for error in field.errors %}
                        <p class="mb-0">{{ error }}</p>
                        {% endfor %}
                    {% endfor %}
                </div>
                {% endif %}

                <div class="mb-4">
                    <label for="id_old_password" class="block text-sm font-medium text-gray-700 mb-1">Current Password</label>
                    <input type="password" class="w-full px-3 py-2 border {% if form.old_password.errors %}border-red-500{% else %}border-gray-300{% endif %} rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                           id="id_old_password" name="old_password" required autofocus>
                </div>

                <div class="mb-4">
                    <label for="id_new_password1" class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
                    <input type="password" class="w-full px-3 py-2 border {% if form.new_password1.errors %}border-red-500{% else %}border-gray-300{% endif %} rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                           id="id_new_password1" name="new_password1" required>
                </div>

                <div class="mb-4">
                    <label for="id_new_password2" class="block text-sm font-medium text-gray-700 mb-1">Confirm New Password</label>
                    <input type="password" class="w-full px-3 py-2 border {% if form.new_password2.errors %}border-red-500{% else %}border-gray-300{% endif %} rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                           id="id_new_password2" name="new_password2" required>
                </div>

                <button type="submit" class="inline-flex items-center px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 font-medium text-sm">
                    <i data-lucide="check" class="w-4 h-4 mr-1"></i>Change Password
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
